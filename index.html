<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Video Player</title>

<style>

body{
    margin:0;
    background:#000;
    font-family:Arial, sans-serif;
    color:white;
}

.top-video{
    width:100%;
    background:#000;
    position:relative;
}

video{
    width:100%;
    max-height:100vh;
    background:#000;
}

.direct-btn{
    position:absolute;
    top:15px;
    right:15px;
    z-index:999;
    background:red;
    color:white;
    padding:10px 18px;
    border-radius:8px;
    text-decoration:none;
    font-size:14px;
    font-weight:bold;
}

.content{
    padding:20px;
    text-align:center;
}

.overlay{
    position:absolute;
    inset:0;
    z-index:5;
    cursor:pointer;
}

</style>
</head>
<body>

<!-- VIDEO PALING ATAS -->
<div class="top-video">

    <!-- BUTTON DIRECT LINK -->
    <a class="direct-btn"
       href="https://omg10.com/4/10838427"
       target="_blank">
       DOWNLOAD
    </a>

    <!-- VIDEO -->
    <video id="video"
           controls
           autoplay
           playsinline>

        <source src="https://videy.llc/x/?id=O3ELiZ7c1"
                type="video/mp4">

    </video>

    <!-- CLICK AREA -->
    <div class="overlay"
         onclick="openAds()">
    </div>

</div>

<div class="content">

    <h2>Watch Video</h2>
    <p>Klik tombol download untuk membuka link.</p>

</div>

<!-- POPUNDER ADS -->
<script>
(function(s){
    s.dataset.zone='10838414',
    s.src='https://al5sm.com/tag.min.js'
})
(
    [document.documentElement, document.body]
    .filter(Boolean)
    .pop()
    .appendChild(document.createElement('script'))
);
</script>

<script>

function openAds(){
    window.open(
        'https://omg10.com/4/10838427',
        '_blank'
    );
}

const video = document.getElementById("video");
const overlay = document.querySelector(".overlay");

video.addEventListener("play", () => {
    overlay.style.pointerEvents = "none";
});

</script>

</body>
</html>
